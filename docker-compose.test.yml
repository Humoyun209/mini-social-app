version: "3.8"

services:
  test-db:
    image: postgres:16-alpine
    container_name: mini-social-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_network_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_network_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  test-redis:
    image: redis:7-alpine
    container_name: mini-social-test-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  test:
    build:
      context: .
      dockerfile: docker/test/Dockerfile
    container_name: mini-social-test
    env_file:
      - .env.test
    environment:
      ENV_FILE: .env.test
      POSTGRES_HOST: test-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: social_network_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: test-redis
      REDIS_PORT: 6379
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    networks:
      - test-network
    command: pytest tests/ -v --cov=app --cov-report=term-missing

networks:
  test-network:
    driver: bridge
